 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeType — Learn Code by Typing</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- Header -->
  <header>
    <div>
      <div class="logo">Code<span>Type</span></div>
      <div class="tagline">Learn Programming by Typing</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:0.8rem;color:var(--muted)">Streak</div>
      <div style="font-family:'Space Mono',monospace;font-size:1.2rem;color:var(--accent3)" id="streak-display">🔥 0</div>
    </div>
  </header>

  <!-- Main Game -->
  <div id="game-screen">

    <!-- Category Tabs -->
    <div class="tabs" id="tabs">
      <button class="tab active" data-cat="java">Java</button>
      <button class="tab" data-cat="python">Python</button>
      <button class="tab" data-cat="javascript">JavaScript</button>
      <button class="tab" data-cat="sql">SQL</button>
      <button class="tab" data-cat="cpp">C++</button>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-box">
        <div class="stat-val" id="wpm-val">0</div>
        <div class="stat-label">WPM</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="acc-val">100%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="stat-box">
        <div class="stat-val warn" id="timer-val">60</div>
        <div class="stat-label">Seconds</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="score-val">0</div>
        <div class="stat-label">Score</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- Snippet info -->
    <div class="snippet-info" id="snippet-info">Category: <strong>Java</strong> — Snippet 1</div>

    <!-- Code Display -->
    <div class="code-card">
      <div class="code-header">
        <div class="code-dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <div class="code-label" id="lang-label">// java</div>
        <div></div>
      </div>
      <div id="code-display"></div>
    </div>

    <!-- Input -->
    <input type="text" id="typing-input" placeholder="Start typing the code above..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-restart">↺ Restart</button>
      <button class="btn btn-outline" id="btn-next">Next Snippet →</button>
      <button class="btn btn-outline" id="btn-leaderboard">🏆 Leaderboard</button>
    </div>

  </div>

  <!-- Result Screen -->
  <div id="result-screen">
    <div class="result-title" id="result-emoji">🎉</div>
    <div class="result-title" id="result-heading">Nice Work!</div>
    <div class="result-grade" id="result-grade">Keep practicing to improve!</div>
    <div class="result-grid">
      <div class="result-card"><div class="big" id="r-wpm">0</div><div class="lbl">WPM</div></div>
      <div class="result-card"><div class="big" id="r-acc">0%</div><div class="lbl">Accuracy</div></div>
      <div class="result-card"><div class="big" id="r-score">0</div><div class="lbl">Score</div></div>
      <div class="result-card"><div class="big" id="r-streak">0</div><div class="lbl">Streak</div></div>
    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-primary" id="btn-play-again">Play Again</button>
      <button class="btn btn-outline" id="btn-view-lb">View Leaderboard</button>
    </div>

    <div class="lb-section" id="lb-section" style="display:none">
      <div class="section-title">🏆 Top Scores</div>
      <div id="lb-list"></div>
    </div>
  </div>

  <!-- Leaderboard (standalone) -->
  <div id="lb-screen" style="display:none">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
      <div style="font-size:1.4rem;font-weight:800">🏆 Leaderboard</div>
      <button class="btn btn-outline" id="btn-back" style="margin-left:auto">← Back</button>
    </div>
    <div id="lb-main-list"></div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script src="Script.js"></script>
</body>
</html>
